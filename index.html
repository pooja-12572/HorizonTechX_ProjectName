<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HorizonTechX Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="calculator" role="application" aria-label="Calculator">
    <header class="calc-header">
      <h1>HorizonTechX Calculator</h1>
    </header>

    <section class="display" aria-live="polite">
      <div id="expression" class="expression" aria-label="Expression">0</div>
      <div id="preview" class="preview" aria-hidden="false"></div>
    </section>

    <section class="buttons" role="group" aria-label="Calculator buttons">
      <button class="btn wide" data-action="clear" title="Clear (Esc)">C</button>
      <button class="btn" data-action="back" title="Backspace (Backspace)">⌫</button>
      <button class="btn" data-value="%">%</button>
      <button class="btn op" data-value="÷">÷</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn op" data-value="×">×</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn op" data-value="-">−</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn op" data-value="+">+</button>

      <button class="btn wide" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn eq" data-action="equals" title="Equals (Enter)">=</button>
    </section>

    <footer class="calc-footer">
      <p class="muted">Keyboard support: numbers, + - * / (or × ÷), Enter = evaluate, Backspace = delete, Esc = clear</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
